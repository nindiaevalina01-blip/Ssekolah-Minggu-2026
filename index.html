<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Absensi Sekolah Minggu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Konfigurasi Firebase
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "",
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sekolah-minggu-app';

        let user = null;
        let students = [];
        let currentView = 'login';
        let selectedClass = 'Bintang';
        let videoStream = null;

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
            }
        };

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) loadData();
        });

        function loadData() {
            if (!user) return;
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'students');
            onSnapshot(q, (snapshot) => {
                students = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                render();
            }, (error) => console.error(error));
        }

        window.navigate = (view, extra = null) => {
            stopCamera(); 
            currentView = view;
            if (extra) selectedClass = extra;
            render();
        };

        window.handleLogin = (e) => {
            e.preventDefault();
            const username = e.target.username.value;
            const password = e.target.password.value;
            if (username === 'admin' && password === 'Immanuel2026') {
                navigate('dashboard');
            } else {
                showToast("Login Gagal! Cek kredensial Anda.", "error");
            }
        };

        window.startCamera = async () => {
            const video = document.getElementById('videoElement');
            const snapBtn = document.getElementById('snapBtn');
            const camPlaceholder = document.getElementById('camPlaceholder');

            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                
                if (video) {
                    video.srcObject = videoStream;
                    video.classList.remove('hidden');
                    if (snapBtn) snapBtn.classList.remove('hidden');
                    if (camPlaceholder) camPlaceholder.classList.add('hidden');
                    await video.play();
                }
            } catch (err) {
                console.error("Camera Error:", err);
                showToast("Gagal akses kamera.", "error");
            }
        };

        window.stopCamera = () => {
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
        };

        window.takePhoto = () => {
            const video = document.getElementById('videoElement');
            const canvas = document.createElement('canvas');
            if (!video || !video.videoWidth) return;

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const data = canvas.toDataURL('image/png');
            document.getElementById('photoPreview').src = data;
            
            stopCamera();
            video.classList.add('hidden');
            document.getElementById('snapBtn').classList.add('hidden');
            document.getElementById('camPlaceholder').classList.remove('hidden');
        };

        window.handleRegister = async (e) => {
            e.preventDefault();
            const photoData = document.getElementById('photoPreview').src;
            if (photoData.includes('placeholder')) return showToast("Ambil foto terlebih dahulu!", "error");

            const formData = new FormData(e.target);
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'students'), {
                    nama: formData.get('nama'),
                    tglLahir: formData.get('tglLahir'),
                    usia: formData.get('usia'),
                    pendidikan: formData.get('pendidikan'),
                    kelas: formData.get('kelas'),
                    foto: photoData,
                    timestamp: new Date().toISOString()
                });
                showToast("Murid Berhasil Terdaftar!", "success");
                navigate('dashboard');
            } catch (err) {
                showToast("Gagal menyimpan data", "error");
            }
        };

        window.startScan = (id) => {
            const student = students.find(s => s.id === id);
            document.getElementById('scanOverlay').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('scanOverlay').classList.add('hidden');
                showModalStatus(student);
            }, 2000);
        };

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = `fixed bottom-6 right-6 p-4 rounded-2xl text-white font-bold transition-all opacity-100 z-[100] shadow-2xl ${type === 'success' ? 'bg-emerald-600' : 'bg-rose-600'}`;
            setTimeout(() => t.classList.add('opacity-0'), 3000);
        }

        function showModalStatus(s) {
            const m = document.getElementById('statusModal');
            document.getElementById('statusContent').innerHTML = `
                <div class="text-center">
                    <div class="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-6 text-emerald-600">
                        <i data-lucide="check-circle-2" class="w-12 h-12"></i>
                    </div>
                    <h2 class="text-2xl font-black text-gray-800 tracking-tight">ABSEN BERHASIL!</h2>
                    <div class="my-6">
                        <img src="${s.foto}" class="w-32 h-32 rounded-[2rem] mx-auto border-4 border-emerald-500 object-cover shadow-xl">
                    </div>
                    <p class="text-xl font-bold text-gray-700">${s.nama}</p>
                    <p class="text-gray-400 text-sm mt-1 uppercase tracking-widest font-semibold">${s.kelas}</p>
                </div>
            `;
            m.classList.remove('hidden');
            lucide.createIcons();
        }

        window.closeModal = () => document.getElementById('statusModal').classList.add('hidden');

        function render() {
            const appDiv = document.getElementById('app');
            if (currentView === 'login') {
                appDiv.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-600 to-indigo-800 p-4">
                        <div class="bg-white/95 backdrop-blur-sm p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-white/20">
                            <div class="text-center mb-10">
                                <div class="bg-blue-600 w-20 h-20 rounded-[1.5rem] flex items-center justify-center mx-auto mb-6 text-white shadow-xl rotate-3 hover:rotate-0 transition-transform duration-500">
                                    <i data-lucide="church" class="w-10 h-10"></i>
                                </div>
                                <h1 class="text-3xl font-black text-gray-900 tracking-tighter uppercase">Portal Absensi</h1>
                                <p class="text-gray-500 font-medium">Sekolah Minggu • Management System</p>
                            </div>
                            <form onsubmit="handleLogin(event)" class="space-y-5">
                                <div class="space-y-1">
                                    <label class="text-xs font-black text-gray-400 uppercase tracking-widest ml-2">Username</label>
                                    <input name="username" type="text" placeholder="Masukkan username" required class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-4 focus:ring-blue-100 focus:bg-white transition-all font-semibold">
                                </div>
                                <div class="space-y-1">
                                    <label class="text-xs font-black text-gray-400 uppercase tracking-widest ml-2">Password</label>
                                    <input name="password" type="password" placeholder="••••••••" required class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-4 focus:ring-blue-100 focus:bg-white transition-all font-semibold">
                                </div>
                                <button type="submit" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black text-lg shadow-xl shadow-blue-200 hover:bg-blue-700 active:scale-[0.98] transition-all tracking-wide">MASUK SEKARANG</button>
                            </form>
                        </div>
                    </div>
                `;
            } else if (currentView === 'dashboard') {
                appDiv.innerHTML = `
                    <div class="min-h-screen bg-slate-50">
                        <div class="max-w-5xl mx-auto p-6 md:p-10">
                            <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12">
                                <div>
                                    <h1 class="text-4xl font-black text-gray-900 tracking-tighter italic">DASHBOARD UTAMA</h1>
                                    <p class="text-gray-500 font-bold uppercase tracking-widest text-xs mt-1">Kelola data & absensi harian</p>
                                </div>
                                <div class="flex gap-3">
                                    <button onclick="navigate('register')" class="bg-blue-600 text-white px-6 py-4 rounded-2xl font-black text-sm flex items-center gap-2 shadow-xl shadow-blue-100 hover:-translate-y-1 transition-all">
                                        <i data-lucide="user-plus" class="w-4 h-4"></i> TAMBAH MURID
                                    </button>
                                    <button onclick="navigate('login')" class="bg-white text-gray-400 hover:text-rose-600 p-4 rounded-2xl shadow-sm border border-gray-100 transition-all">
                                        <i data-lucide="log-out" class="w-5 h-5"></i>
                                    </button>
                                </div>
                            </header>

                            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                                ${['Bintang', 'Cahaya', 'Pra Remaja'].map(c => {
                                    const count = students.filter(s => s.kelas === c).length;
                                    const colors = c === 'Bintang' ? 'from-amber-400 to-orange-500' : c === 'Cahaya' ? 'from-blue-400 to-indigo-600' : 'from-purple-500 to-fuchsia-600';
                                    const icon = c === 'Bintang' ? 'star' : c === 'Cahaya' ? 'sun' : 'smile';
                                    return `
                                    <div onclick="navigate('class_list', '${c}')" class="relative overflow-hidden group bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100 cursor-pointer hover:shadow-2xl hover:border-blue-200 transition-all duration-500">
                                        <div class="absolute -right-4 -top-4 w-24 h-24 bg-gradient-to-br ${colors} opacity-10 rounded-full blur-2xl group-hover:opacity-20 transition-opacity"></div>
                                        <div class="flex justify-between items-start mb-10">
                                            <div class="p-4 rounded-2xl bg-slate-50 text-gray-800 group-hover:bg-blue-600 group-hover:text-white transition-all duration-500">
                                                <i data-lucide="${icon}" class="w-8 h-8"></i>
                                            </div>
                                            <div class="text-right">
                                                <p class="text-3xl font-black text-gray-900">${count}</p>
                                                <p class="text-[10px] font-black text-gray-400 uppercase tracking-tighter">Murid</p>
                                            </div>
                                        </div>
                                        <h3 class="text-2xl font-black text-gray-900 tracking-tight italic">KELAS ${c.toUpperCase()}</h3>
                                        <div class="mt-4 flex items-center text-xs font-black text-blue-600 opacity-0 group-hover:opacity-100 transition-all transform translate-x-2 group-hover:translate-x-0">
                                            MULAI ABSENSI <i data-lucide="chevron-right" class="w-4 h-4 ml-1"></i>
                                        </div>
                                    </div>
                                `}).join('')}
                            </div>
                        </div>
                    </div>
                `;
            } else if (currentView === 'class_list') {
                const list = students.filter(s => s.kelas === selectedClass);
                appDiv.innerHTML = `
                    <div class="min-h-screen bg-white">
                        <div class="sticky top-0 z-20 bg-white/80 backdrop-blur-xl border-b border-gray-50 px-6 py-6 flex items-center justify-between">
                            <div class="flex items-center gap-6">
                                <button onclick="navigate('dashboard')" class="w-12 h-12 bg-slate-50 hover:bg-slate-100 rounded-2xl flex items-center justify-center transition-colors">
                                    <i data-lucide="arrow-left" class="w-5 h-5 text-gray-600"></i>
                                </button>
                                <div>
                                    <h2 class="text-2xl font-black text-gray-900 tracking-tighter italic uppercase">KELAS ${selectedClass}</h2>
                                    <p class="text-xs font-bold text-gray-400 tracking-widest uppercase">${list.length} Murid Terdaftar</p>
                                </div>
                            </div>
                        </div>

                        <div class="max-w-3xl mx-auto p-6 space-y-4">
                            ${list.length === 0 ? `
                                <div class="text-center py-20 bg-slate-50 rounded-[3rem] border-2 border-dashed border-gray-200">
                                    <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm text-gray-300">
                                        <i data-lucide="users-2" class="w-10 h-10"></i>
                                    </div>
                                    <p class="font-bold text-gray-400">Belum ada murid di kelas ini.</p>
                                </div>
                            ` : list.map(s => `
                                <div class="group p-5 bg-white border border-gray-100 rounded-3xl flex justify-between items-center hover:shadow-xl hover:border-blue-100 transition-all duration-300">
                                    <div class="flex items-center gap-5">
                                        <div class="relative">
                                            <img src="${s.foto}" class="w-16 h-16 rounded-2xl object-cover shadow-md group-hover:scale-105 transition-transform">
                                            <div class="absolute -bottom-1 -right-1 w-5 h-5 bg-emerald-500 border-2 border-white rounded-full"></div>
                                        </div>
                                        <div>
                                            <h3 class="font-black text-gray-800 text-lg leading-none mb-1 uppercase">${s.nama}</h3>
                                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">${s.pendidikan} • ${s.usia} TAHUN</p>
                                        </div>
                                    </div>
                                    <button onclick="startScan('${s.id}')" class="bg-blue-600 text-white h-14 w-14 rounded-2xl shadow-lg shadow-blue-100 hover:scale-110 active:scale-95 transition-all flex items-center justify-center">
                                        <i data-lucide="scan-face" class="w-6 h-6"></i>
                                    </button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (currentView === 'register') {
                appDiv.innerHTML = `
                    <div class="min-h-screen bg-slate-50 p-6">
                        <div class="max-w-2xl mx-auto">
                            <header class="flex items-center gap-6 mb-10">
                                <button onclick="navigate('dashboard')" class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm text-gray-400 hover:text-gray-900 transition-all">
                                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                                </button>
                                <h1 class="text-3xl font-black text-gray-900 tracking-tighter italic">REGISTRASI MURID</h1>
                            </header>

                            <form onsubmit="handleRegister(event)" class="bg-white p-8 md:p-12 rounded-[3rem] shadow-xl space-y-8 border border-gray-100">
                                <div class="text-center space-y-6">
                                    <div class="relative inline-block group">
                                        <div id="camPlaceholder" class="w-44 h-44 bg-slate-100 rounded-[2.5rem] mx-auto flex items-center justify-center text-gray-300 border-4 border-white shadow-inner overflow-hidden">
                                            <img id="photoPreview" src="https://via.placeholder.com/200?text=PAS+FOTO" class="w-full h-full object-cover">
                                        </div>
                                        <video id="videoElement" autoplay playsinline muted class="hidden w-44 h-44 rounded-[2.5rem] bg-black mx-auto object-cover border-4 border-white shadow-2xl"></video>
                                        
                                        <div class="mt-6 flex flex-wrap justify-center gap-3">
                                            <button type="button" onclick="startCamera()" class="bg-slate-900 text-white px-6 py-3 rounded-2xl text-xs font-black tracking-widest uppercase hover:bg-blue-600 transition-colors flex items-center gap-2">
                                                <i data-lucide="camera" class="w-4 h-4"></i> Buka Kamera
                                            </button>
                                            <button type="button" id="snapBtn" onclick="takePhoto()" class="hidden bg-rose-600 text-white px-6 py-3 rounded-2xl text-xs font-black tracking-widest uppercase shadow-lg shadow-rose-100 flex items-center gap-2">
                                                <i data-lucide="aperture" class="w-4 h-4"></i> Capture
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-6">
                                    <div class="md:col-span-2 space-y-1">
                                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-2">Nama Lengkap</label>
                                        <input name="nama" placeholder="Masukkan nama murid" required class="w-full p-4 bg-slate-50 border border-gray-100 rounded-2xl outline-none focus:ring-4 focus:ring-blue-100 font-bold transition-all">
                                    </div>
                                    <div class="space-y-1">
                                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-2">Tanggal Lahir</label>
                                        <input name="tglLahir" type="date" required class="w-full p-4 bg-slate-50 border border-gray-100 rounded-2xl outline-none focus:ring-4 focus:ring-blue-100 font-bold transition-all">
                                    </div>
                                    <div class="space-y-1">
                                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-2">Usia</label>
                                        <input name="usia" type="number" placeholder="0" class="w-full p-4 bg-slate-50 border border-gray-100 rounded-2xl outline-none focus:ring-4 focus:ring-blue-100 font-bold transition-all">
                                    </div>
                                    <div class="space-y-1">
                                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-2">Pilih Kelas</label>
                                        <select name="kelas" class="w-full p-4 bg-slate-50 border border-gray-100 rounded-2xl outline-none focus:ring-4 focus:ring-blue-100 font-bold transition-all">
                                            <option>Bintang</option><option>Cahaya</option><option>Pra Remaja</option>
                                        </select>
                                    </div>
                                    <div class="space-y-1">
                                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-2">Pendidikan</label>
                                        <select name="pendidikan" class="w-full p-4 bg-slate-50 border border-gray-100 rounded-2xl outline-none focus:ring-4 focus:ring-blue-100 font-bold transition-all">
                                            <option>Belum Sekolah</option><option>TK</option><option>SD Kelas 1-3</option><option>SD Kelas 4-6</option><option>SMP</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="pt-6">
                                    <button type="submit" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black text-xl shadow-2xl shadow-blue-200 hover:bg-blue-700 active:scale-[0.98] transition-all tracking-tight">SIMPAN DATA MURID</button>
                                </div>
                            </form>
                        </div>
                    </div>
                `;
            }
            lucide.createIcons();
        }

        window.onload = async () => {
            await initAuth();
            render();
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .scan-line {
            position: absolute;
            width: 100%;
            height: 8px;
            background: linear-gradient(to bottom, transparent, #22c55e, transparent);
            box-shadow: 0 0 30px #22c55e;
            animation: moveScan 2s ease-in-out infinite;
            z-index: 10;
        }
        @keyframes moveScan { 0%, 100% { top: 0; opacity: 0.3; } 50% { top: 100%; opacity: 1; } }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    </style>
</head>
<body class="bg-slate-50 selection:bg-blue-100 selection:text-blue-900">
    <div id="app"></div>

    <!-- Feedback UI Components -->
    <div id="toast" class="fixed bottom-6 right-6 p-4 rounded-2xl text-white opacity-0 transition-all duration-500 z-[100] shadow-2xl translate-y-4"></div>

    <!-- Status Modal -->
    <div id="statusModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-6 z-[100] hidden">
        <div class="bg-white rounded-[3rem] p-10 max-w-sm w-full relative shadow-2xl transform transition-all border border-white/20">
            <div id="statusContent"></div>
            <button onclick="closeModal()" class="w-full mt-10 bg-slate-900 text-white py-5 rounded-[1.5rem] font-black tracking-widest uppercase text-sm hover:bg-blue-600 transition-colors shadow-lg">LANJUTKAN</button>
        </div>
    </div>

    <!-- Scan Animation Overlay -->
    <div id="scanOverlay" class="fixed inset-0 bg-slate-900/95 flex flex-col items-center justify-center z-[100] hidden">
        <div class="relative w-72 h-72 border-4 border-white/5 rounded-[3rem] overflow-hidden shadow-[0_0_100px_rgba(34,197,94,0.1)]">
            <div class="scan-line"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-blue-500/10 to-transparent"></div>
            <div class="absolute inset-4 border-2 border-white/10 rounded-[2.5rem] border-dashed"></div>
        </div>
        <div class="text-center mt-12">
            <h3 class="text-3xl font-black text-white tracking-tighter italic animate-pulse">VERIFIKASI WAJAH...</h3>
            <p class="text-emerald-400 font-bold text-xs uppercase tracking-[0.3em] mt-2">Sistem AI Aktif</p>
        </div>
    </div>
</body>
</html>
