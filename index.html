<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Absensi Sekolah Minggu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Konfigurasi Firebase
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "",
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sekolah-minggu-app';

        let user = null;
        let students = [];
        let currentView = 'login';
        let selectedClass = 'Bintang';
        let videoStream = null;

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
            }
        };

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) loadData();
        });

        function loadData() {
            if (!user) return;
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'students');
            onSnapshot(q, (snapshot) => {
                students = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                render();
            }, (error) => console.error(error));
        }

        window.navigate = (view, extra = null) => {
            stopCamera(); // Selalu matikan kamera saat pindah halaman
            currentView = view;
            if (extra) selectedClass = extra;
            render();
        };

        window.handleLogin = (e) => {
            e.preventDefault();
            if (e.target.username.value === 'admin' && e.target.password.value === 'Immanuel2026') {
                navigate('dashboard');
            } else {
                showToast("Login Gagal!", "error");
            }
        };

        // --- PERBAIKAN LOGIKA KAMERA ---
        window.startCamera = async () => {
            const video = document.getElementById('videoElement');
            const snapBtn = document.getElementById('snapBtn');
            const camPlaceholder = document.getElementById('camPlaceholder');

            try {
                // Minta izin kamera
                videoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                
                if (video) {
                    video.srcObject = videoStream;
                    video.classList.remove('hidden');
                    if (snapBtn) snapBtn.classList.remove('hidden');
                    if (camPlaceholder) camPlaceholder.classList.add('hidden');
                    
                    // Pastikan video dimainkan setelah stream disetel
                    await video.play();
                }
            } catch (err) {
                console.error("Camera Error:", err);
                showToast("Gagal akses kamera. Pastikan izin diberikan.", "error");
            }
        };

        window.stopCamera = () => {
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
        };

        window.takePhoto = () => {
            const video = document.getElementById('videoElement');
            const canvas = document.createElement('canvas');
            if (!video || !video.videoWidth) return;

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const data = canvas.toDataURL('image/png');
            document.getElementById('photoPreview').src = data;
            
            stopCamera();
            video.classList.add('hidden');
            document.getElementById('snapBtn').classList.add('hidden');
            document.getElementById('camPlaceholder').classList.remove('hidden');
        };

        window.handleRegister = async (e) => {
            e.preventDefault();
            const photoData = document.getElementById('photoPreview').src;
            if (photoData.includes('placeholder')) return showToast("Ambil foto dulu!", "error");

            const formData = new FormData(e.target);
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'students'), {
                    nama: formData.get('nama'),
                    tglLahir: formData.get('tglLahir'),
                    usia: formData.get('usia'),
                    pendidikan: formData.get('pendidikan'),
                    kelas: formData.get('kelas'),
                    foto: photoData,
                    timestamp: new Date().toISOString()
                });
                showToast("Berhasil Terdaftar!", "success");
                navigate('dashboard');
            } catch (err) {
                showToast("Gagal menyimpan data", "error");
            }
        };

        window.startScan = (id) => {
            const student = students.find(s => s.id === id);
            document.getElementById('scanOverlay').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('scanOverlay').classList.add('hidden');
                showModalStatus(student);
            }, 2000);
        };

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = `fixed bottom-4 right-4 p-4 rounded-xl text-white transition-all opacity-100 z-50 ${type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
            setTimeout(() => t.classList.add('opacity-0'), 3000);
        }

        function showModalStatus(s) {
            const m = document.getElementById('statusModal');
            document.getElementById('statusContent').innerHTML = `
                <div class="text-center">
                    <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4 text-green-600">
                        <i data-lucide="check-circle" class="w-10 h-10"></i>
                    </div>
                    <h2 class="text-xl font-black">ABSEN BERHASIL</h2>
                    <img src="${s.foto}" class="w-24 h-24 rounded-full mx-auto my-4 border-4 border-green-500 object-cover">
                    <p class="font-bold">${s.nama}</p>
                </div>
            `;
            m.classList.remove('hidden');
            lucide.createIcons();
        }

        window.closeModal = () => document.getElementById('statusModal').classList.add('hidden');

        function render() {
            const appDiv = document.getElementById('app');
            if (currentView === 'login') {
                appDiv.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center bg-slate-50 p-4">
                        <div class="bg-white p-8 rounded-[2rem] shadow-2xl w-full max-w-md">
                            <div class="text-center mb-8">
                                <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 text-white"><i data-lucide="church"></i></div>
                                <h1 class="text-2xl font-black">SM PORTAL</h1>
                            </div>
                            <form onsubmit="handleLogin(event)" class="space-y-4">
                                <input name="username" type="text" placeholder="Username" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none">
                                <input name="password" type="password" placeholder="Password" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none">
                                <button type="submit" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-black shadow-lg">LOGIN</button>
                            </form>
                        </div>
                    </div>
                `;
            } else if (currentView === 'dashboard') {
                appDiv.innerHTML = `
                    <div class="min-h-screen bg-white">
                        <div class="p-6 max-w-4xl mx-auto">
                            <div class="flex justify-between items-center mb-10">
                                <h1 class="text-2xl font-black">MENU UTAMA</h1>
                                <button onclick="navigate('register')" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold text-sm">+ MURID</button>
                            </div>
                            <div class="grid gap-4">
                                ${['Bintang', 'Cahaya', 'Pra Remaja'].map(c => `
                                    <div onclick="navigate('class_list', '${c}')" class="p-6 border-2 border-gray-100 rounded-3xl hover:border-blue-500 transition-all cursor-pointer flex justify-between items-center group">
                                        <span class="text-xl font-black">${c}</span>
                                        <i data-lucide="chevron-right" class="group-hover:translate-x-1 transition-transform"></i>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            } else if (currentView === 'class_list') {
                const list = students.filter(s => s.kelas === selectedClass);
                appDiv.innerHTML = `
                    <div class="min-h-screen bg-white">
                        <div class="p-4 border-b flex items-center gap-4">
                            <button onclick="navigate('dashboard')"><i data-lucide="arrow-left"></i></button>
                            <h2 class="font-black">KELAS ${selectedClass.toUpperCase()}</h2>
                        </div>
                        <div class="p-4 space-y-3">
                            ${list.map(s => `
                                <div class="p-4 bg-gray-50 rounded-2xl flex justify-between items-center">
                                    <div class="flex items-center gap-3">
                                        <img src="${s.foto}" class="w-12 h-12 rounded-full object-cover">
                                        <span class="font-bold">${s.nama}</span>
                                    </div>
                                    <button onclick="startScan('${s.id}')" class="bg-blue-600 text-white p-3 rounded-xl"><i data-lucide="scan"></i></button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (currentView === 'register') {
                appDiv.innerHTML = `
                    <div class="min-h-screen bg-white p-6">
                        <form onsubmit="handleRegister(event)" class="max-w-md mx-auto space-y-6">
                            <div class="text-center space-y-4">
                                <div id="camPlaceholder" class="w-32 h-32 bg-gray-100 rounded-3xl mx-auto flex items-center justify-center text-gray-400">
                                    <img id="photoPreview" src="https://via.placeholder.com/150?text=FOTO" class="w-full h-full rounded-3xl object-cover">
                                </div>
                                <video id="videoElement" autoplay playsinline muted class="hidden w-full rounded-3xl bg-black mx-auto"></video>
                                <div class="flex justify-center gap-2">
                                    <button type="button" onclick="startCamera()" class="bg-gray-900 text-white px-4 py-2 rounded-xl text-xs font-bold">BUKA KAMERA</button>
                                    <button type="button" id="snapBtn" onclick="takePhoto()" class="hidden bg-red-600 text-white px-4 py-2 rounded-xl text-xs font-bold">AMBIL FOTO</button>
                                </div>
                            </div>
                            <div class="space-y-4">
                                <input name="nama" placeholder="Nama Lengkap" required class="w-full p-4 bg-gray-50 border rounded-2xl outline-none">
                                <div class="grid grid-cols-2 gap-2">
                                    <input name="tglLahir" type="date" required class="p-4 bg-gray-50 border rounded-2xl outline-none">
                                    <input name="usia" type="number" placeholder="Usia" class="p-4 bg-gray-50 border rounded-2xl outline-none">
                                </div>
                                <select name="kelas" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none">
                                    <option>Bintang</option><option>Cahaya</option><option>Pra Remaja</option>
                                </select>
                                <select name="pendidikan" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none">
                                    <option>SD</option><option>SMP</option><option>Belum Sekolah</option>
                                </select>
                            </div>
                            <button type="submit" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-black">SIMPAN MURID</button>
                            <button type="button" onclick="navigate('dashboard')" class="w-full text-gray-400 font-bold">BATAL</button>
                        </form>
                    </div>
                `;
            }
            lucide.createIcons();
        }

        window.onload = async () => {
            await initAuth();
            render();
        };
    </script>
    <style>
        .scan-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: #22c55e;
            box-shadow: 0 0 20px #22c55e;
            animation: moveScan 2s ease-in-out infinite;
        }
        @keyframes moveScan { 0%, 100% { top: 0; } 50% { top: 100%; } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="app"></div>
    <div id="toast" class="fixed bottom-4 right-4 p-4 rounded-xl text-white opacity-0 transition-all duration-300 z-50"></div>
    <div id="statusModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-6 z-50 hidden">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full relative">
            <div id="statusContent"></div>
            <button onclick="closeModal()" class="w-full mt-6 bg-gray-100 py-3 rounded-xl font-bold">TUTUP</button>
        </div>
    </div>
    <div id="scanOverlay" class="fixed inset-0 bg-black/90 flex flex-col items-center justify-center z-50 hidden">
        <div class="relative w-64 h-64 border-2 border-white/20 rounded-3xl overflow-hidden">
            <div class="scan-line"></div>
        </div>
        <p class="mt-8 text-green-500 font-black animate-pulse uppercase tracking-widest">Memindai...</p>
    </div>
</body>
</html>
